services:
  mq_redis:
    container_name: mq_redis
    expose:
      - ${MQ_REDIS_PORT}
    image: redis:7.4-alpine
    networks:
      - frg-network
    ports:
      - "${MQ_REDIS_PORT}:6379"
    restart: always
    volumes:
      - redis_db_data:/data/mq_redis
    
  mq_bullboard:
    container_name: mq_bullboard
    depends_on:
      - mq_redis
    environment:
      REDIS_HOST: mq_redis
      REDIS_PORT: ${MQ_REDIS_PORT}
      REDIS_USE_TLS: 'false'
      BULL_PREFIX: bull
      USER_LOGIN: ${MQ_USER_LOGIN}
      USER_PASSWORD: ${MQ_USER_PASSWORD}
    image: venatum/bull-board:2.1.5
    networks:
      - frg-network
    ports:
      - "${MQ_BULLBOARD_PORT}:3000"
    restart: always

  mq_healthcheck:
    container_name: mq_healthcheck
    image: alpine:3.19
    depends_on:
      - mq_redis
      - mq_bullboard
    environment:
      HC_REDIS_URL: ${MQ_HC_REDIS_URL:-}
      HC_BULLBOARD_URL: ${MQ_HC_BULLBOARD_URL:-}
      REDIS_HOST: mq_redis
      REDIS_PORT: ${MQ_REDIS_PORT}
      BULLBOARD_HOST: mq_bullboard
      BULLBOARD_PORT: 3000
      CHECK_INTERVAL: ${MQ_HC_INTERVAL:-60}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl redis > /dev/null 2>&1
        echo "Healthcheck monitor started (interval: $${CHECK_INTERVAL}s)"
        while true; do
          if [ -n "$$HC_REDIS_URL" ]; then
            if redis-cli -h $$REDIS_HOST -p $$REDIS_PORT ping 2>/dev/null | grep -q PONG; then
              curl -fsS -m 10 --retry 3 "$$HC_REDIS_URL" > /dev/null 2>&1
            else
              curl -fsS -m 10 --retry 3 "$$HC_REDIS_URL/fail" > /dev/null 2>&1
            fi
          fi
          if [ -n "$$HC_BULLBOARD_URL" ]; then
            if curl -sf http://$$BULLBOARD_HOST:$$BULLBOARD_PORT > /dev/null 2>&1; then
              curl -fsS -m 10 --retry 3 "$$HC_BULLBOARD_URL" > /dev/null 2>&1
            else
              curl -fsS -m 10 --retry 3 "$$HC_BULLBOARD_URL/fail" > /dev/null 2>&1
            fi
          fi
          sleep $$CHECK_INTERVAL
        done
    networks:
      - frg-network
    restart: always

volumes:
  redis_db_data:
    external: false

networks:
  frg-network:
    driver: bridge
